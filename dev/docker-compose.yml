version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leansage-backend
    ports:
      - "9019:8000"
    environment:
      - APP_NAME=LeanProve AI
      - APP_VERSION=0.1.0
      - DEBUG=false
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-leansage-production-jwt-secret-key-2026}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=10080
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://47.242.43.35:3029
      - CORS_ORIGINS=http://47.242.43.35:3029,http://localhost:3029
      - DATABASE_URL=${DATABASE_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - LOG_LEVEL=INFO
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - leansage-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://47.242.43.35:9019/v1
    container_name: leansage-frontend
    ports:
      - "3029:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - leansage-net

  redis:
    image: redis:7-alpine
    container_name: leansage-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - leansage-net

volumes:
  redis-data:

networks:
  leansage-net:
    driver: bridge
