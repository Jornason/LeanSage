[pytest]
testpaths = api smoke
addopts = -v --tb=short --color=yes
markers =
    smoke:      Quick sanity checks — always run (< 10s total)
    auth:       Authentication & security tests
    search:     Mathlib search tests
    generate:   Proof generation tests (calls AI, ~5-60s each)
    diagnose:   Error diagnosis tests (calls AI, ~5-30s each)
    explain:    Tactic explanation tests
    convert:    LaTeX ↔ Lean conversion tests
    compile:    Lean compilation tests
    user:       User profile & usage tests
    sessions:   Proof session CRUD tests
    billing:    Billing & subscription tests
    quota:      Rate-limiting & quota enforcement tests
    concurrent: Concurrency & stress tests
    ai:         Any test that calls the AI model (slower, can be skipped offline)
    slow:       Tests that take > 30s

# Default timeout per test (requires pytest-timeout)
timeout = 90
